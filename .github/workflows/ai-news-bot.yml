name: 🤖 AI News Hourly Email Bot

on:
  # Har 1 ghante automatically chalega
  schedule:
    - cron: '0 * * * *'

  # Manual bhi chala sakte ho GitHub se
  workflow_dispatch:

jobs:
  send-ai-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Fetch AI News & Send Email
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: node run-once.js
