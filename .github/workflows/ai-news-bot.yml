name: 🤖 AI Daily Digest — 6 PM IST

on:
  # Daily at 6:00 PM IST = 12:30 PM UTC
  schedule:
    - cron: '30 12 * * *'

  # Manual bhi chala sakte ho GitHub se
  workflow_dispatch:

jobs:
  send-ai-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Send AI Daily Digest Email
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: node run-once.js
