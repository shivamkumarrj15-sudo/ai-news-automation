name: 🤖 AI Daily Digest — 6 PM IST

on:
  # Daily at 6:00 PM IST = 12:30 PM UTC
  schedule:
    - cron: '30 12 * * *'

  # Manual bhi chala sakte ho GitHub se
  workflow_dispatch:

# Keep workflow alive — prevent GitHub from disabling
permissions:
  contents: write

jobs:
  send-ai-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Send AI Daily Digest Email
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: node run-once.js

      - name: 💓 Keep Alive — Prevent GitHub from disabling workflow
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@ai-news.com"
          echo "Last run: $(date -u)" > .last-run
          git add .last-run
          git diff --cached --quiet || git commit -m "🤖 keep-alive: $(date -u +%Y-%m-%d)"
          git push || true
