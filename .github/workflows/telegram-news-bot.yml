name: 🤖 AI News Telegram Bot

on:
  schedule:
    # Runs every hour automatically
    - cron: '0 * * * *'

  # Allows manual runs from the GitHub website
  workflow_dispatch:

jobs:
  send-telegram-news:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Fetch AI News & Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS || '7863710238' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_INTERVAL_MINUTES: 65 # Hourly interval + 5 min buffer to prevent missing articles due to startup delays
        run: node run-once-telegram.js
